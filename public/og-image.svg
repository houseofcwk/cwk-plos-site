<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Ambient orb top-left: cyan -->
    <radialGradient id="orbTopLeft" cx="0" cy="0" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(0,229,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,229,255,0)"/>
    </radialGradient>
    <!-- Ambient orb bottom-right: purple -->
    <radialGradient id="orbBottomRight" cx="1200" cy="630" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(123,97,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(123,97,255,0)"/>
    </radialGradient>
    <!-- Bottom accent bar gradient -->
    <linearGradient id="accentBar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <!-- Noise filter -->
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#07090F"/>

  <!-- Ambient orbs -->
  <rect width="1200" height="630" fill="url(#orbTopLeft)"/>
  <rect width="1200" height="630" fill="url(#orbBottomRight)"/>

  <!-- Noise overlay -->
  <rect width="1200" height="630" fill="#ffffff" opacity="0.02" filter="url(#noise)"/>

  <!-- Top-left: CWK. wordmark -->
  <text
    x="64"
    y="94"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="800"
    fill="#EEF0FF"
    letter-spacing="-1"
  >CWK.</text>

  <!-- Below CWK.: eyebrow label -->
  <text
    x="64"
    y="126"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#FB3079"
    letter-spacing="3"
  >THE SPORTS AGENT FOR ENTREPRENEURS</text>

  <!-- Center headline line 1 -->
  <text
    x="64"
    y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#FFFFFF"
  >The operating system</text>

  <!-- Center headline line 2 -->
  <text
    x="64"
    y="366"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#FFFFFF"
  >for entrepreneurs.</text>

  <!-- Subtext below headline -->
  <text
    x="64"
    y="416"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="rgba(238,240,255,0.55)"
  >Build. Learn. Earn. Play.</text>

  <!-- Bottom-right: domain -->
  <text
    x="1136"
    y="600"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="rgba(238,240,255,0.38)"
    text-anchor="end"
  >houseofcwk.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentBar)"/>
</svg>
